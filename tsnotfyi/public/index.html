<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <base href="/">
    <title>Stream</title>
    <link href="fonts/inter.css" rel="stylesheet">
    <link href="fonts/jetbrains-mono.css" rel="stylesheet">
    <script src="scripts/d3.v7.min.js"></script>
    <script src="scripts/three.min.js"></script>
    <link href="scripts/styles.css" rel="stylesheet">
    <script src="scripts/tubes.js"></script>
    <script src="scripts/scene.js"></script>
    <script src="scripts/fzf.js"></script>
</head>
<body>
    <!-- Background layer -->
    <div id="background"></div>

    <!-- 3D visualization scene -->
    <div id="scene"></div>

    <!-- Now Playing Card -->
    <div id="nowPlayingCard">
        <div id="playlistNameLabel" class="playlist-name-label"></div>
        <div class="card">
            <div class="panel">
                <div class="photo" id="cardPhoto"></div>
                <span class="rim"></span>
                <div class="bottom"></div>
                <div class="label">
                    <h2 id="cardDirection">Journey</h2>
                    <h3 id="cardTitle">Loading...</h3>
                    <h4 id="cardArtist"></h4>
                    <h5 id="cardAlbum"></h5>
                    <p id="cardMeta"></p>
                </div>
            </div>
        </div>
        <button id="btnLove" class="love-btn" title="Love">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
        <button id="btnHate" class="hate-btn" title="Hate">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>

    <!-- Playlist controls -->
    <div id="playlistControls" class="playlist-controls">
        <button id="btnLoadPlaylist" class="playlist-btn" title="Load playlist (L)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 002-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
        </button>
        <button id="btnSaveSession" class="playlist-btn" title="Save session">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
        </button>
    </div>

    <!-- Playlist Tray - Queue with left/right stacks -->
    <div id="nextTrackTray" aria-label="Playlist queue">
        <div class="playlist-left-stack" aria-label="Queued tracks"></div>
        <div class="playlist-right-stack" aria-label="Played tracks"></div>
    </div>

    <!-- Dimension Cards in Circular Layout -->
    <div id="dimensionCards"></div>

    <!-- Full-screen click catcher -->
    <div id="clickCatcher">
        <div class="hint">sound explorer</div>
    </div>

    <!-- Custom volume control -->
    <div id="volumeControl">
        <div id="volumeBar"></div>
    </div>
    <div class="diagnostic-bar">
        <div id="playbackClock" class="playback-clock is-hidden" title="Current playback time"></div>
    </div>


    <!-- Search icon for fzf activation -->
    <div id="searchIcon" title="Fuzzy search tracks">
        <span id="searchIconText">?</span>
    </div>

    <!-- Manual refresh button (double-click for new session) -->
    <div id="refreshButton" title="Click: refresh cards | Double-click: new session">
        <div class="refresh-icon">⟳</div>
    </div>

    <!-- Fuzzy search interface -->
    <div id="fzfSearch" class="hidden">
        <div class="fzf-container">
            <input type="text" id="fzfInput" placeholder=" 🔍 fuzzy search tracks..." autocomplete="off" spellcheck="false">
            <div id="fzfResults" class="fzf-results"></div>
            <div class="fzf-hint">type to search • ESC to close • ENTER to jump to track • ↑↓ to navigate</div>
        </div>
    </div>

    <!-- Fullscreen progress bar -->
    <div id="fullscreenProgress">
        <div id="progressWipe"></div>
    </div>

    <audio id="audio"></audio>

    <script src="scripts/browser-logger.js"></script>
    <script src="scripts/deck-frame-builder.js"></script>
    <script type="module" src="scripts/page.js"></script>
</body>
</html>
